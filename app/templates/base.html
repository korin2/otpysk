<!DOCTYPE html>
<html lang="ru" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Отпускной — учёт отпусков{% endblock %}</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Отпускной">
    <meta name="theme-color" content="#1e293b">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e293b'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='50'>🏖️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        sidebar: '#1e293b',
                        holiday: '#ef4444',
                        vacation: '#3b82f6',
                        planned: '#f59e0b',
                        active: '#22c55e',
                        completed: '#6b7280',
                    }
                }
            }
        }
    </script>
    <style>
        .gantt-bar { transition: all 0.2s ease; }
        .gantt-bar:hover { opacity: 0.8; transform: scaleY(1.5); z-index: 10; }
        .tooltip { visibility: hidden; position: absolute; }
        .has-tooltip:hover .tooltip { visibility: visible; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col lg:flex-row overflow-x-hidden">
    {% if hide_nav is not defined %}
    <!-- Десктопный сайдбар (виден только на lg+) -->
    <aside class="hidden lg:flex w-64 bg-sidebar text-white min-h-screen p-6 flex-col flex-shrink-0">
        <div class="mb-8">
            <a href="/" class="text-2xl font-bold tracking-wide">🏖️ Отпускной</a>
            <p class="text-gray-400 text-sm mt-1">учёт отпусков</p>
        </div>

        <nav class="flex flex-col gap-2 flex-1">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors {{ 'bg-white/20' if request.url.path == '/' else '' }}">
                <span>📊</span> Дашборд
            </a>
            <a href="/employees" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors {{ 'bg-white/20' if request.url.path.startswith('/employees') else '' }}">
                <span>👥</span> Сотрудники
            </a>
            <a href="/calendar" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors {{ 'bg-white/20' if request.url.path.startswith('/calendar') else '' }}">
                <span>📅</span> Календарь
            </a>
        </nav>

        <div class="mt-auto pt-4 border-t border-white/20">
            <a href="/api/auth/logout" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-600/50 transition-colors text-red-300">
                <span>🚪</span> Выйти
            </a>
        </div>
    </aside>
    {% endif %}

    <!-- Основной контент -->
    <main class="flex-1 p-3 lg:p-8 overflow-auto pb-20 lg:pb-8 max-w-full pt-6 lg:pt-0">
        {% block content %}{% endblock %}
    </main>

    {% if hide_nav is not defined %}
    <!-- Мобильная нижняя панель (видна только на <lg) -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-sidebar text-white flex justify-around items-center py-2 px-1 z-50 safe-area-bottom">
        <a href="/" class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-xs {{ 'bg-white/20' if request.url.path == '/' else '' }}">
            <span class="text-lg">📊</span>
            <span>Дашборд</span>
        </a>
        <a href="/employees" class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-xs {{ 'bg-white/20' if request.url.path.startswith('/employees') else '' }}">
            <span class="text-lg">👥</span>
            <span>Сотрудники</span>
        </a>
        <a href="/calendar" class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-xs {{ 'bg-white/20' if request.url.path.startswith('/calendar') else '' }}">
            <span class="text-lg">📅</span>
            <span>Календарь</span>
        </a>
        <a href="/api/auth/logout" class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-xs text-red-300">
            <span class="text-lg">🚪</span>
            <span>Выйти</span>
        </a>
    </nav>
    {% endif %}

    <script>
        if ('serviceWorker' in navigator) {
            // Сброс старого service worker из /static/
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                registrations.forEach(function(reg) {
                    if (reg.scope.includes('/static/')) reg.unregister();
                });
            });
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
