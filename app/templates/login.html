{% extends "base.html" %}
{% block title %}Вход — Отпускной{% endblock %}

{% block content %}
{% set hide_nav = True %}
<div class="flex items-center justify-center min-h-screen bg-gray-50">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">🏖️ Отпускной</h1>
            <p class="text-gray-500 mt-2">Войдите для управления отпусками</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form action="/api/auth/login" method="post" class="space-y-5">
            <div>
                <label for="login" class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
                <input type="text" id="login" name="login" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"
                    placeholder="admin">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-primary text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition-colors">
                Войти
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            -------------
        </p>
    </div>
</div>
{% endblock %}
